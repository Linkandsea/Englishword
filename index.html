<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07c160">
  <title>CET4 Sprint</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="logo-dot" aria-hidden="true"></div>
        <div>
          <h1 class="brand-title">CET4 Sprint</h1>
          <p class="brand-sub">四级词汇训练系统</p>
        </div>
      </div>
      <div class="status-pill">
        <span class="dot"></span>
        <span>学习中</span>
      </div>
    </header>

    <div class="workspace">
      <aside class="side-nav" aria-label="主要功能">
        <button class="nav-btn active" data-tab="vocab">词汇选择</button>
        <button class="nav-btn" data-tab="analysis">长难句分析</button>
        <button class="nav-btn" data-tab="translate">中英互译</button>
        <button class="nav-btn" data-tab="reading">阅读精读</button>
        <button class="nav-btn" data-tab="wrongbook">错题本</button>
      </aside>

      <main class="panel-area" aria-live="polite">
        <section id="tab-vocab" class="tab-panel active">
          <div class="section-head">
            <h2>词汇选择题</h2>
            <p>答对自动下一题，答错自动加入错题本</p>
          </div>

          <div class="stats">
            <div><span>总题数</span><strong id="v-total">0</strong></div>
            <div><span>当前</span><strong id="v-index">0</strong></div>
            <div><span>正确</span><strong id="v-correct">0</strong></div>
            <div><span>错误</span><strong id="v-wrong">0</strong></div>
          </div>

          <div class="question-area">
            <div class="q-row">
              <div class="q-word" id="q-word">loading...</div>
              <button id="speak-btn" class="ghost-btn">发音</button>
            </div>
            <p class="q-tip">请选择最准确的中文释义</p>
            <div id="options" class="option-list"></div>
            <div id="q-feedback" class="feedback"></div>
          </div>
        </section>

        <section id="tab-analysis" class="tab-panel">
          <div class="section-head">
            <h2>长难句分析</h2>
            <p>按结构拆解，再看分步理解</p>
          </div>

          <div class="q-row stretch">
            <h3 id="analysis-sentence"></h3>
            <button id="next-analysis" class="ghost-btn">换一句</button>
          </div>

          <div class="analysis-grid">
            <div>
              <h4>结构拆解</h4>
              <p id="analysis-structure"></p>
            </div>
            <div>
              <h4>分步理解</h4>
              <ol id="analysis-steps"></ol>
            </div>
          </div>

          <h4>参考翻译</h4>
          <p id="analysis-cn"></p>
        </section>

        <section id="tab-translate" class="tab-panel">
          <div class="section-head">
            <h2>中英互译训练</h2>
            <p>先自己翻译，再查看参考答案</p>
          </div>

          <div class="q-row stretch">
            <div id="tr-direction" class="pill"></div>
            <button id="next-translate" class="ghost-btn">换题</button>
          </div>

          <p id="tr-prompt" class="translate-prompt"></p>
          <textarea id="tr-answer" placeholder="在这里输入你的翻译..."></textarea>

          <div class="q-row">
            <button id="check-translate" class="solid-btn">查看参考</button>
            <button id="mark-hard" class="ghost-btn">加入难句本</button>
          </div>
          <div id="tr-ref" class="feedback"></div>
        </section>

        <section id="tab-reading" class="tab-panel">
          <div class="section-head">
            <h2>阅读精读</h2>
            <p>英文原文、中文翻译与重点词汇同步查看</p>
          </div>

          <div class="q-row stretch">
            <h3 id="reading-title"></h3>
            <button id="next-reading" class="ghost-btn">换文章</button>
          </div>

          <div class="reading-grid">
            <div class="reading-main">
              <h4>English</h4>
              <p id="reading-en"></p>
              <h4>中文翻译</h4>
              <p id="reading-cn"></p>
            </div>
            <aside>
              <h4>重点词汇</h4>
              <ul id="reading-words"></ul>
            </aside>
          </div>
        </section>

        <section id="tab-wrongbook" class="tab-panel">
          <div class="section-head">
            <h2>错题本 / 难句本</h2>
            <p>自动记录错题，手动收藏难句</p>
          </div>

          <div class="wrongbook-layout">
            <div>
              <h4>词汇错题</h4>
              <ul id="wrong-vocab"></ul>
            </div>
            <div>
              <h4>难句收藏</h4>
              <ul id="hard-sentences"></ul>
            </div>
          </div>
          <button id="clear-wrongbook" class="ghost-btn danger">清空记录</button>
        </section>
      </main>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
